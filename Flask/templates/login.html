<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
</head>
<body>

<h2>Login</h2>
{% if message %}
   <p style = "color: darkgreen;"> {{message}}</p>
{% endif %}
<form action="/perform_login" method="post">
    <label>Email:</label><br>
    <input type="text" name="user_email" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="user_password" required><br><br>

    <button type="submit">Login</button>
</form>
    <p>No a member? <a href = "/register">Register here</a></p>
</body>
</html>
