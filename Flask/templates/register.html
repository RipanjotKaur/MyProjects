<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
</head>
<body>

<h2>Register</h2>


{% if message %}
   <p style = "color: rgb(230, 13, 13);"> {{message}}</p>
{% endif %}


<form action = "/perform_registration" method="post">

    <label>Name:</label><br>
    <input type="text" name="user_name" required><br><br>

    <label>Email:</label><br>
    <input type="text" name="user_email" required><br><br>

    <label>Password:</label><br>
    <input type="password" name="user_password" required><br><br>

    <button type="submit">Register</button>
</form>
    <p>No a member? <a href = "/">Login here</a></p>
</body>
</html>
